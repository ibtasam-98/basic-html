<!DOCTYPE html>

<head>

.input-group{ margin-bottom:20px; }

label{ font-weight:bold; font-size:14px; }

input,select{
  width:100%;
  height:45px;

  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  transition:.3s;

input:focus,select:focus{ box-shadow:0 0 12px #00ffcc; }

.gender-group{
  display:flex;
  gap:20px;

.gender-group input{
  accent-color:#00ffcc;

}

  border-radius:12px;
  background:#00ffcc;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  transition:.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
  transform:scale(1.05);
}

.login-text{
  text-align:center;
  margin-top:20px;
  font-size:14px;
}

.login-text a{
  color:#00ffcc;
  text-decoration:none;
  font-weight:bold;
}
.password-wrapper{
  position: relative;
}

.eye{
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);

}
</style>
</head>

<body>

<script>
function togglePassword(){
  let pass = document.getElementById("password");
  let icon = document.getElementById("eyeIcon");

  if(pass.type === "password"){
    pass.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  }else{
    pass.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}
</script>
